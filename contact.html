  <main class="page">
    <h1 style="color: #b13cff;">Contact Us</h1>
    <p class="subtitle">Have questions or want to share your favorite anime? Send us a message below.</p>

    <section class="contact-container">
      <form class="contact-form">
        <form class="contact-form"
      action="mailto:gilyarc@email.sc.edu" 
      method="POST" 
      enctype="text/plain" 
      onsubmit="showMessage()">
    
        <label>
          Namw
          <input type="text" name="firstname" placeholder="Your first name" required>
          <input type="text" name="lastname" placeholder="Your last name" required>
        
        </label>
        <label>
          Email
          <input type="email" name="email" placeholder="you@example.com">
        </label>
        <label>
          Subject
          <input type="text" name="subject" placeholder="Subject of your message">
          <textarea name="subject" placeholder="Tell us what you think"></textarea>
        </label>
        <button type="submit">Send Message</button>
      </form>
    </section>
  </main>
