<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <title>Anime Hub - Contact Us</title>
  <link rel="stylesheet" href="style.css">
</head>
<body>
  <header>
    <nav>
      <h2>Anime Hub</h2>
      <a href="index.html">Home</a>
      <a href="reviews.html">Reviews</a>
      <a href="recommendations.html">Recommendations</a>
      <a href="news.html">News</a>
      <a href="contact.html">Contact Us</a>
    </nav>
  </header>

  <main class="page">
    <h1>Contact Us</h1>
    <p class="subtitle">Have questions or want to share your favorite anime? Send us a message below.</p>

    <section class="contact-container">
      <form class="contact-form">
        <label>
          Name
          <input type="text" name="name" placeholder="Your name">
        </label>
        <label>
          Email
          <input type="email" name="email" placeholder="you@example.com">
        </label>
        <label>
          Message
          <textarea name="message" placeholder="Tell us what you think"></textarea>
        </label>
        <button type="submit">Send Message</button>
      </form>
    </section>
  </main>
  <footer>© 2026 Anime Hub</footer>
</body>
</html>
